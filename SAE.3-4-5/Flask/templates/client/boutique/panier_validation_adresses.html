{% extends "client/layout_client.html" %}
{% block body %}
    <div class="container">
        <div class="row align-self-right">
            {% include('client/boutique/_panier.html') %}
        </div>
        <div class="row">
            <br>
            <div class="col-12">
                <h3>Récapitulatif de votre commande</h3>
                <p>Total à payer : <strong>{{ "{:,.2f} €".format(prix_total) }}</strong></p>

                <form action="/client/commande/add" method="post" style="display: inline-block;">
                    <button class="btn btn-success btn-lg">Confirmer la commande</button>
                </form>

                <form action="/client/panier/vider" method="post" style="display: inline-block; margin-left: 10px;">
                    <button class="btn btn-danger btn-lg">Vider le panier</button>
                </form>

                <a href="/client/linge/show" class="btn btn-primary btn-lg" style="margin-left: 10px;">Continuer les achats</a>
            </div>
        </div>
    </div>
{% endblock %}
